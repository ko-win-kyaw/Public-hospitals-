name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # Senior ရဲ့ branch နာမည် main မဟုတ်ရင် ပြင်ပေးပါ

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          # GitHub Secrets က Key တွေကို Build လုပ်ချိန်မှာ ထည့်ပေးခြင်း
          VITE_ADMIN_EMAIL_1: ${{ secrets.VITE_ADMIN_EMAIL_1 }}
          VITE_ADMIN_EMAIL_2: ${{ secrets.VITE_ADMIN_EMAIL_2 }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_IMGBB_KEY: ${{ secrets.VITE_IMGBB_KEY }}
          VITE_BUNNY_KEY: ${{ secrets.VITE_BUNNY_KEY }}
          VITE_BUNNY_STORAGE: ${{ secrets.VITE_BUNNY_STORAGE }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
