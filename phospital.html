    function showAdmin() { document.querySelectorAll('.admin-only').forEach(e => e.style.display = 'block'); }
    function formatTime(ts) { if(!ts) return ""; return new Date(ts).toLocaleString(); }
// --- View System (Optimized for Senior) ---
const viewObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        // Post တစ်ခုကို ၅၀% ကျော် မြင်ရပြီဆိုတာနဲ့ view တက်မယ်
        if (entry.isIntersecting) {
            const postId = entry.target.dataset.id;
            if (postId) {
                db.collection("page_posts").doc(postId).update({ 
                    views: firebase.firestore.FieldValue.increment(1) 
                }).catch(err => console.error("View update error:", err));
                
                // တစ်ခါတက်ပြီးရင် ထပ်မတက်အောင် ရပ်လိုက်မယ်
                viewObserver.unobserve(entry.target);
            }
        }
    });
}, { 
    threshold: 0.5 
});
function loadPosts(pageOwnerId = null) {
    const feed = document.getElementById('feed');
    if (!feed) return;
    const currentUid = auth.currentUser.uid;
    feed.innerHTML = ""; 

    let query = db.collection("page_posts");

    // pageOwnerId ရှိရင် အဲ့ဒီလူရဲ့ Post ပဲပြမယ်
    if (pageOwnerId) {
        query = query.where("uid", "==", pageOwnerId);
    }

    // Pin logic နှင့် အချိန်အလိုက် စီခြင်း (Index ဆောက်ထားရန် လိုအပ်ပါသည်)
    query.orderBy("isPinned", "desc").orderBy("createdAt", "desc")
    .onSnapshot(snap => {
        if (snap.metadata.hasPendingWrites) return;

        snap.docChanges().forEach(change => {
            const d = change.doc.data(); 
            const id = change.doc.id;
            const isOwnerOrDev = (d.uid === currentUid) || (auth.currentUser.email === ADMIN_EMAIL);

            if (change.type === "added") {
                const div = document.createElement('div'); 
                div.className = "card"; 
                div.id = `post-${id}`; 
                div.dataset.id = id;
                
                let mediaHTML = "";
                if (d.mediaUrls && d.mediaUrls.length > 0) {
                    if (d.mediaType === 'video') {
                        mediaHTML = `<video src="${d.mediaUrls[0]}" controls class="post-media" style="width:100%; max-height:400px; border-radius:8px;"></video>`;
                    } else {
                        mediaHTML = `<div style="display:grid; grid-template-columns: repeat(${d.mediaUrls.length > 1 ? 2 : 1}, 1fr); gap:5px; margin-top:10px;">`;
                        d.mediaUrls.forEach(url => {
                            mediaHTML += `<img src="${url}" class="post-media" style="width:100%; height:150px; object-fit:cover; border-radius:8px; cursor:pointer;" onclick="openFullImg('${url}')">`;
                        });
                        mediaHTML += `</div>`;
                    }
                }

                // --- Senior ရဲ့ Logic တွေ အားလုံးကို စနစ်တကျ ပြန်ပေါင်းစပ်ထားတဲ့ အပိုင်း ---
                div.innerHTML = `
                    <div style="font-size:12px; color:gray; margin-bottom:8px;">
                        ${(d.isPinned === 1 || d.isPinned === true) ? '<span style="color:red; font-weight:bold;">📌 Pinned Post</span><br>' : ''}
                        <b>${d.author || 'Admin'}</b> • <span id="v-${id}">${d.views || 0}</span> views <br>
                        <span class="time-label">${formatTime(d.createdAt)}</span>
                    </div>

                    <p style="white-space:pre-wrap;">${d.text}</p>
                    ${mediaHTML}
                    
                    <div class="interaction" id="int-${id}">
                        <span onclick="handleReact('${id}', 'likes')" style="cursor:pointer; color:${(d.likedBy || []).includes(currentUid) ? 'purple' : 'gray'}">👍 <span id="l-${id}">${d.likes || 0}</span></span>
                        <span onclick="handleReact('${id}', 'hahas')" style="cursor:pointer; color:${(d.hahaedBy || []).includes(currentUid) ? 'orange' : 'gray'}">😆 <span id="h-${id}">${d.hahas || 0}</span></span>
                        <span onclick="toggleC('${id}')" style="cursor:pointer;">💬 <span id="cc-${id}">${(d.comments || []).length || 0}</span></span>
                        <span onclick="sharePost('${id}')" style="cursor:pointer; color:purple;">🚀 Share</span>
                        
                        ${isOwnerOrDev ? `
                            <span onclick="deleteAnythingWithCleanup('${id}')" style="color:red; cursor:pointer;">🗑️</span> 
                            <span onclick="togglePin('${id}', ${d.isPinned})" style="color:${(d.isPinned === 1 || d.isPinned === true) ? 'red' : 'gray'}; cursor:pointer;">📌</span>
                        ` : ''}
                    </div>

                    <div class="comment-box" id="cb-${id}">
                        <div id="cl-${id}"></div>
                        <div style="display:flex; margin-top:10px; gap:5px;">
                            <input type="text" id="cInput-${id}" placeholder="Comment..." style="flex:1; border-radius:15px; border:1px solid #ddd; padding:5px 10px; outline:none;">
                            <button onclick="addComment('${id}')" style="border:none; background:purple; color:white; border-radius:15px; padding:5px 12px;">Send</button>
                        </div>
                    </div>`;
                
                feed.appendChild(div);
                if (window.viewObserver) viewObserver.observe(div);
                loadComments(id);
            }

            if (change.type === "modified") {
                const postEl = document.getElementById(`post-${id}`);
                if (postEl && change.doc.metadata.hasPendingWrites === false) {
                    const lEl = document.getElementById(`l-${id}`);
                    const hEl = document.getElementById(`h-${id}`);
                    const vEl = document.getElementById(`v-${id}`);
                    if (lEl) lEl.innerText = d.likes || 0;
                    if (hEl) hEl.innerText = d.hahas || 0;
                    if (vEl) vEl.innerText = d.views || 0;
                }
            }
        });
    }, err => {
        console.error("Query Error (Index required): ", err);
        alert("Database Index ဆောက်ရန် လိုအပ်နေပါသည်။ Browser Console ကို စစ်ဆေးပါ။");
    });
}

async function handlePost() {
    const text = document.getElementById('postText').value.trim();
    const files = Array.from(document.getElementById('mediaInput').files);
    const btn = document.getElementById('btnPost');
    
    if(!text && files.length === 0) return;

    btn.disabled = true; 
    btn.innerText = "Uploading Media...";

    try {
        const userDoc = await db.collection("users").doc(auth.currentUser.uid).get();
        const authorName = userDoc.data()?.requestedPageName || auth.currentUser.displayName || "Admin";

        // Senior လိုချင်တဲ့ Parallel Upload Logic (Promise.all)
        const uploadPromises = files.map(async (file) => {
            if (file.type.startsWith('video/')) {
                const fName = `${Date.now()}_${file.name.replace(/\s+/g, '_')}`;
                const res = await fetch(`https://sg.storage.bunnycdn.com/${BUNNY_STORAGE}/${fName}`, {
                    method: 'PUT',
                    headers: { 'AccessKey': BUNNY_KEY },
                    body: file
                });
                if (res.ok) return `https://${BUNNY_STORAGE}.b-cdn.net/${fName}`;
            } else {
                const fd = new FormData();
                fd.append('image', file);
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
                    method: 'POST',
                    body: fd
                });
                const data = await res.json();
                if (data.success) return data.data.url;
            }
            return null;
        });

        // ပုံအားလုံး တစ်ပြိုင်နက်တက်သွားအောင် စောင့်မယ်
        const mediaUrls = (await Promise.all(uploadPromises)).filter(Boolean);
        
        // Video ပါသလား စစ်မယ် (mediaType သတ်မှတ်ရန်)
        const hasVideo = files.some(f => f.type.startsWith('video/'));

        await db.collection("page_posts").add({ 
            uid: auth.currentUser.uid, 
            author: authorName,
            text: text, 
            mediaUrls: mediaUrls, // Array အနေနဲ့ သိမ်းမယ်
            mediaType: hasVideo ? 'video' : 'image', 
            likes: 0, 
            likedBy: [], 
            hahas: 0, 
            hahaedBy: [], 
            comments: [], 
            views: 0, 
            isPinned: 0, 
            createdAt: Date.now() 
        });

        document.getElementById('postText').value = ""; 
        cancelMedia();
        alert("Post အောင်မြင်စွာ တင်ပြီးပါပြီ Senior!");

    } catch (error) {
        console.error("Post Error:", error);
        alert("Upload လုပ်ရာမှာ အမှားအယွင်း ရှိသွားပါတယ်");
    } finally {
        btn.disabled = false; 
        btn.innerText = "Post";
    }
}


// Preview ပြတဲ့နေရာမှာ ပုံအများကြီးပြဖို့ ပြင်ထားပါတယ်
function previewMedia(i) {
    const files = Array.from(i.files);
    const b = document.getElementById('mediaPreview'); 
    if(files.length === 0) return;
    if(files.length > 10) { alert("ပုံ ၁၀ ပုံထက် ပိုတင်လို့မရပါ"); i.value=""; return; }
    
    b.style.display = "block";
    b.innerHTML = `<div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:5px;"></div>`;
    const grid = b.querySelector('div');

    files.forEach(f => {
        const url = URL.createObjectURL(f);
        grid.innerHTML += f.type.startsWith('video') 
            ? `<video src="${url}" style="width:100%; height:80px; object-fit:cover; border-radius:5px;"></video>` 
            : `<img src="${url}" style="width:100%; height:80px; object-fit:cover; border-radius:5px;">`;
    });
    
    b.innerHTML += `<div onclick="cancelMedia()" style="position:absolute; top:-10px; right:-10px; background:red; color:white; border-radius:50%; width:25px; height:25px; text-align:center; line-height:23px; cursor:pointer;">×</div>`;
}

    function cancelMedia() { 
        document.getElementById('mediaInput').value = ""; 
        document.getElementById('mediaPreview').innerHTML = "";
        document.getElementById('mediaPreview').style.display = 'none'; 
    }
    async function handleReact(postId, type) {
    try {
        const uid = auth.currentUser.uid;
        const isLike = (type === 'likes');
        
        // ၁။ UI အတွက် Element တွေကို အရင်ယူမယ်
        const countPrefix = isLike ? 'l-' : 'h-';
        const countEl = document.getElementById(`${countPrefix}${postId}`);
        const iconEl = document.getElementById(`int-${postId}`).querySelector(`span[onclick*="${type}"]`);
        
        if (!countEl || !iconEl) return; // Element မရှိရင် ဘာမှမလုပ်ဘူး

        // ၂။ Optimistic UI Update - Database ကို မစောင့်ဘဲ ချက်ချင်းပြမယ်
        let currentCount = parseInt(countEl.innerText) || 0;
        // အရောင်ကိုကြည့်ပြီး React လုပ်ပြီးသားလား စစ်မယ် (Optimistic Check)
        const isAlreadyReacted = (iconEl.style.color === 'purple' || iconEl.style.color === 'orange');

        if (isAlreadyReacted) {
            countEl.innerText = Math.max(0, currentCount - 1);
            iconEl.style.color = 'gray';
        } else {
            countEl.innerText = currentCount + 1;
            iconEl.style.color = isLike ? 'purple' : 'orange';
        }

        // ၃။ Database Logic (နဂို Logic အတိုင်း အနောက်မှာ အလုပ်လုပ်မယ်)
        const ref = db.collection("page_posts").doc(postId);
        const field = isLike ? 'likedBy' : 'hahaedBy';
        const dbCountField = isLike ? 'likes' : 'hahas';

        // 💡 ဒီနေရာမှာ await မခံတော့ဘူး၊ နောက်ကွယ်ကနေ Update လှမ်းလုပ်မယ်
        ref.get().then(snap => {
            if (!snap.exists) return;
            const d = snap.data();
            const hasReactedInDB = (d[field] || []).includes(uid);

            if (hasReactedInDB) {
                // DB မှာ ရှိနေရင် ပြန်ဖြုတ်မယ်
                return ref.update({ 
                    [field]: firebase.firestore.FieldValue.arrayRemove(uid), 
                    [dbCountField]: firebase.firestore.FieldValue.increment(-1) 
                });
            } else {
                // DB မှာ မရှိသေးရင် အသစ်ထည့်မယ်
                return ref.update({ 
                    [field]: firebase.firestore.FieldValue.arrayUnion(uid), 
                    [dbCountField]: firebase.firestore.FieldValue.increment(1) 
                }).then(() => {
                    sendNoti(`${auth.currentUser.displayName} reacted to your post`);
                });
            }
        }).catch(err => {
            console.error("Database Update Error:", err);
            // Error ဖြစ်ခဲ့ရင် UI ကို မူလအတိုင်း ပြန်ပြင်ပေးဖို့ Logic (Optional)
        });

    } catch (error) {
        console.error("Reaction Error:", error);
    }
}

async function addComment(postId) {
    const val = document.getElementById(`cInput-${postId}`).value.trim();
    if (!val) return;

    async function reactComment(postId, commentId, type) {
    const ref = db.collection("page_posts")
        .doc(postId)
        .collection("comments")
        .doc(commentId);

    const snap = await ref.get();
    const d = snap.data();
    const uid = auth.currentUser.uid;

    const field = type === "likes" ? "likedBy" : "hahaedBy";
    const countField = type === "likes" ? "likes" : "hahas";

    if ((d[field] || []).includes(uid)) {
        await ref.update({
            [field]: firebase.firestore.FieldValue.arrayRemove(uid),
            [countField]: firebase.firestore.FieldValue.increment(-1)
        });
    } else {
        await ref.update({
            [field]: firebase.firestore.FieldValue.arrayUnion(uid),
            [countField]: firebase.firestore.FieldValue.increment(1)
        });
    }
}

async function searchPage() {
    const queryInput = document.getElementById('pageSearch').value.trim();
    const resBox = document.getElementById('searchResults');
    
    // စာမရိုက်ထားရင် result box ကို ပိတ်ထားမယ်
    if (!queryInput) { 
        resBox.style.display = "none"; 
        return; 
    }

    // စာလုံးအကြီးအသေး ညှိဖို့ (Database ထဲမှာ lowercase နဲ့ သိမ်းထားရင် ပိုကောင်းပါတယ်)
    const query = queryInput.toLowerCase();

    try {
        // Firebase Query: requestedPageName က query နဲ့ စတဲ့ data တွေကိုပဲ ဆွဲထုတ်မယ်
        const snap = await db.collection("users")
                       .where("requestedPageName", ">=", query)
                       .where("requestedPageName", "<=", query + "\uf8ff")
                       .get();

        resBox.innerHTML = ""; 
        let hasResults = false;

        if (snap.empty) {
            resBox.style.display = "none";
            return;
        }

        snap.forEach(doc => {
            const data = doc.data();
            hasResults = true;
            resBox.style.display = "block";
            
            const item = document.createElement('div');
            item.className = "search-item";
            item.style = "padding: 12px 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; align-items: center; gap: 12px;";
            
            const profilePic = data.profile ? 
                `<img src="${data.profile}" style="width:35px; height:35px; border-radius:50%; object-fit:cover; border:1px solid #ddd;">` : 
                `<div style="width:35px; height:35px; border-radius:50%; background:#eee; display:flex; align-items:center; justify-content:center;">🏥</div>`;
            
            item.innerHTML = `
                ${profilePic}
                <div style="display:flex; flex-direction:column;">
                    <b style="font-size:14px; color:#333;">${data.requestedPageName}</b>
                    <small style="font-size:10px; color:gray;">Admin: ${data.name || 'User'}</small>
                </div>
            `;
            
            // Item ကို နှိပ်လိုက်ရင် viewOtherPage function ကို ခေါ်မယ်
            item.onclick = () => {
                viewOtherPage(doc.id);
            };
            
            resBox.appendChild(item);
        });

    } catch (error) {
        console.error("Search error:", error);
    }
}

async function deleteAnythingWithCleanup(id) {
    if (!confirm("ဒီ Post ကို ဖျက်မှာ သေချာပါသလား?")) return;
    
    try {
        const ref = db.collection("page_posts").doc(id);
        const snap = await ref.get();
        if (!snap.exists) return;
        const d = snap.data();

        // ၁။ Bunny CDN က Media (Array) ကို အကုန်လိုက်ဖျက်မယ်
        if (d.mediaUrls && Array.isArray(d.mediaUrls)) {
            for (let url of d.mediaUrls) {
                if (url.includes('b-cdn.net')) {
                    const fileName = url.split('/').pop();
                    try {
                        await fetch(`https://sg.storage.bunnycdn.com/${BUNNY_STORAGE}/${fileName}`, { 
                            method: 'DELETE', 
                            headers: { 'AccessKey': BUNNY_KEY } 
                        });
                    } catch (err) {
                        console.error("Bunny Delete Error:", err);
                    }
                }
            }
        }
        
        // ၂။ Firestore က Post ကို ဖျက်မယ်
        await ref.delete();
        alert("Deleted Successfully!");

        // UI ကနေ ချက်ချင်းဖယ်ထုတ်မယ်
        const postEl = document.getElementById(`post-${id}`);
        if (postEl) postEl.remove();

    } catch (e) {
        console.error("Delete error:", e);
        alert("ဖျက်လို့မရပါ (Permission Denied)");
    }
}

async function togglePin(id, curStatus) {

            isPinned: newStatus // 0 သို့မဟုတ် 1 (Number) အနေနဲ့ သွားမယ်

        alert(newStatus === 1 ? "Pinned! 📌" : "Unpinned!");

        console.error("Pin error:", e);
    }

     // --- Branding Upload Logic (Senior Edition) ---
    async function uploadBranding(type, input) {
        const file = input.files[0];
        if (!file) return;

        const btnLabel = input.parentElement;
        const originalText = btnLabel.innerHTML;
        btnLabel.innerHTML = "⏳"; // Upload တင်နေစဉ် icon ပြောင်းထားမယ်

        try {
            // ၁။ ImgBB ကို အရင် Upload တင်မယ်
            const fd = new FormData();
            fd.append('image', file);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { 
                method: 'POST', 
                body: fd 
            });
            const d = await res.json();
            
            if (d.success) {
                const url = d.data.url;
                const uid = auth.currentUser.uid;
                const isDeveloper = (auth.currentUser.email === ADMIN_EMAIL);

                // ၂။ Database ထဲမှာ Developer လား User လားခွဲပြီး သိမ်းမယ်
                if (isDeveloper) {
                    // Senior (Developer) ဆိုရင် Main Branding ကို ပြင်မယ်
                    await db.collection("page_info").doc("main").set({ [type]: url }, { merge: true });
                } else {
                    // Page Admin (User) ဆိုရင် သူ့ရဲ့ User Document ထဲမှာ သိမ်းမယ်
                    await db.collection("users").doc(uid).update({ [type]: url });
                }
                alert("Branding Updated Successfully! ✨");
                location.reload(); // ပုံအသစ်ပေါ်လာအောင် Page ကို Refresh လုပ်မယ်
            }
        } catch (e) {
            console.error("Upload Error:", e);
            alert("Upload failed! Please try again.");
        } finally {
            btnLabel.innerHTML = originalText;
        }
    }
