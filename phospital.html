<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PH - Official Pages</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
            <script src="https://openfpcdn.io/fingerprintjs/v4/iife.js"></script>
    <link rel="stylesheet" href="style.css">
     <script src="script.js"></script>
</head>
<body>
    <header class="header-container">
        <div class="logo">
            <div class="e-box"><span class="e-letter">P</span></div>
            <span class="logo-text">age</span>
        </div>
        <div class="search-section">
            <input type="text" id="pageSearch" placeholder="Search Pages..." oninput="searchPage('users', 'requestedPageName')" " style="background-color: white;color: purple;border-radius: 5px;"

            >
            <div id="searchResults" class="search-results-box"></div>
        </div>
    </header>

    <div class="profile-header">
        <div class="cover-area">
            <img id="coverDisplay" src="default-cover.jpg">
            <label class="edit-cover-btn admin-only">📷<input type="file" hidden onchange="uploadBranding('cover', this)"></label>
        </div>
        <div class="avatar-area">
            <img id="profileDisplay" src="default-avatar.jpg">
            <label class="edit-avatar-btn admin-only">Edit<input type="file" hidden onchange="uploadBranding('profile', this)"></label>
        </div>
        <div class="profile-basic-info">
            <h2 id="pageNameHeader">Loading...</h2>
            <div id="statusArea"></div>
        </div>
    </div>
<div id="statusArea">
    <button id="joinBtn" onclick="handleJoin('pages')"" style="background-color: purple;color: white;border-radius: 5px;margin-left: 20px;"
>Join Page</button>
    <button onclick="showCreateModal('pages')"" style="background-color: purple;color: white;border-radius: 5px;"
>Create Page</button>
</div>

    </div>
<div class="post-box">
    <textarea id="postText" placeholder="What's on your mind?"></textarea>
    
    <div id="mediaPreview" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px;"></div>

    <div class="post-actions">
        <label style="cursor: pointer;">
            🖼️ Media (Max 10)
            <input type="file" id="mediaInput" multiple hidden accept="image/*,video/*" onchange="previewMedia(this)">
        </label>
        <button onclick="handlePost('page_posts')"
        " style="background-color: purple;color: white;border-radius: 5px;"
        >တင်မည်</button>
    </div>
</div>

    <div id="newsFeed"></div>

    <script src="app.js"></script> 
    <script>
        // Page Specific Logic
        const params = new URLSearchParams(window.location.search);
        const targetId = params.get('id');

        auth.onAuthStateChanged(user => {
            if(user) {
                const viewId = targetId || user.uid;
                loadBranding(viewId);
                loadPosts('page_posts', viewId);
                checkAccess(viewId, 'page');
            } else { window.location.href="login.html"; }
        });
    </script>
</body>
</html>
