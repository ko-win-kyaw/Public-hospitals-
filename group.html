<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PH - Groups</title>
        <script src="https://openfpcdn.io/fingerprintjs/v4/iife.js"></script>
    <link rel="stylesheet" href="style.css">
     <script src="script.js"></script>

</head>
<body>
    <header class="header-container">
        <div class="logo">
            <div class="e-box"><span class="e-letter">G</span></div>
            <span class="logo-text">roups</span>
        </div>
        <input type="text" id="pageSearch" placeholder="Search Groups..." oninput="searchPage('groups', 'groupName')"
        style="background-color: white;border-radius: 5px;>
        <div id="searchResults" class="search-results-box"></div>
    </header>

    <div class="profile-header">
        <div class="cover-area">
            <img id="groupCover" src="default-group.jpg">
            <label class="edit-cover-btn group-admin-only">📷<input type="file" hidden onchange="uploadBranding('cover', this, 'groups')"></label>
        </div>
        <div class="profile-basic-info">
            <h2 id="groupNameHeader">Group Name</h2>
            <p id="memberCount">0 Members</p>
            <div id="statusArea"></div>
        </div>
    <div class="group-avatar-container" style="position: relative; width: 120px; height: 120px; margin-top: -120px; margin-left: 20px;">
        <img id="groupProfile" src="default-group-avatar.png" style="width: 100%; height: 100%; border-radius: 50%; border: 4px solid white; object-fit: cover; background: #eee;">
        
        <label class="group-admin-only" style="position: absolute; bottom: 5px; right: 5px; background: #fff; border-radius: 50%; padding: 5px; cursor: pointer; border: 1px solid #ccc;">
            📷 <input type="file" hidden onchange="uploadBranding('profile', this, 'groups')">
        </label>
    </div>
</div>
<div id="statusArea">
    <button id="joinBtn" onclick="handleJoin('pages')" style="background-color: purple;color: white;margin-left: 30px;border-radius: 5px;"
    >Join Group</button>
    <button onclick="showCreateModal('pages')" style="background-color: purple;color: white;border-radius: 5px;"
    >Create Group</button>
</div>

    </div>
<div class="post-box">
    <textarea id="postText" placeholder="What's on your mind?"></textarea>
    
    <div id="mediaPreview" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px;"></div>

    <div class="post-actions">
        <label style="cursor: pointer;">
            🖼️ Media <input type="file" id="mediaInput" multiple hidden accept="image/*,video/*" onchange="previewMedia(this)">
        </label>
        <button onclick="handlePost('group_posts')" style="background-color: purple;color: white;border-radius: 5px;"
        >တင်မည်</button>
    </div>
</div>

    <div id="newsFeed"></div>

    <script src="app.js"></script>
    <script>
    // Group Data ကို Load လုပ်တဲ့ Function
async function loadGroupData(groupId) {
    const doc = await db.collection("groups").doc(groupId).get();
    if (doc.exists) {
        const data = doc.data();
        document.getElementById('groupNameHeader').innerText = data.groupName;
        
        // Profile ပုံ ရှိလျှင် ပြောင်းပေးမည်၊ မရှိလျှင် default ပုံ သုံးမည်
        if (data.profileUrl) {
            document.getElementById('groupProfile').src = data.profileUrl;
        }
        if (data.coverUrl) {
            document.getElementById('groupCover').src = data.coverUrl;
        }

        // Admin ဖြစ်မဖြစ် စစ်ဆေးပြီး Edit Button များ ဖျောက်/ပြ လုပ်ခြင်း
        if (data.adminUid === auth.currentUser.uid) {
            document.querySelectorAll('.group-admin-only').forEach(el => el.style.display = 'block');
        }
    }
}

        const params = new URLSearchParams(window.location.search);
        const targetId = params.get('id'); // Group ID

        auth.onAuthStateChanged(user => {
            if(user) {
                if(targetId) {
                    loadGroupBranding(targetId);
                    loadPosts('group_posts', targetId);
                    checkAccess(targetId, 'group');
                } else {
                    renderGroupList(); // Group ရွေးခိုင်းမယ်
                }
            }
        });
    </script>
</body>
</html>
