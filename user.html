        <style>/* ===== GLOBAL STYLES ===== */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Padauk', 'Pyidaungsu', 'Noto Sans Myanmar', sans-serif;
    background: #f0f2f5;
    margin: 0;
    padding-top: 60px; /* Header အမြင့်စာ နေရာချန်ပေးရန် */
    padding-bottom: 70px; /* Bottom nav အတွက် နေရာချန် */
}

/* ===== HEADER ===== */
.header {
    background: purple;
    color: white;
    padding:15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    box-sizing: border-box;
    position: fixed; /* နေရာကို အသေသတ်မှတ်သည် */
    top: 0px;          /* အပေါ်ဆုံးတွင် ကပ်ထားသည် */
    left: 0;         /* ဘယ်ဘက်အစမှ စတင်သည် */
    z-index: 3000;   /* အခြား Element များထက် အပေါ်ရောက်နေစေရန် */
}

/* ===== MODALS ===== */
#nameSetupModal, #phoneLoginModal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    z-index: 9999;
    align-items: center;
    justify-content: center;
}

/* ===== POST CARD ===== */
.post-card {
    background: white;
    border-radius: 12px;
    padding: 15px !important;
    margin: 10px auto;
    width: 100%;
    max-width: 600px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    overflow: hidden;
    box-sizing: border-box;
}

/* Media Container */
.post-media-container {
    width: 100%;
    margin: 10px -15px 0 -15px !important; /* Card padding ကို ချိုးပြီး Screen ပြည့်အောင် */
    padding: 0;
    position: relative;
    left: 0;
    right: 0;
}

/* Video and Image Styles */
.post-media-container video,
.post-media-container img {
    width: 100vw !important; /* Viewport width အတိုင်း */
    max-width: 600px; /* ဒါပေမယ့် သတ်မှတ်ထားတာထက် မကျော်ရ */
    height: auto;
    display: block;
    margin: 0 auto;
    object-fit: cover;
}

/* Multiple Images Grid */
.post-media-grid {
    display: grid;
    gap: 5px;
    margin: 10px -15px 0 -15px !important;
    width: 100vw;
    max-width: 600px;
}

.post-media-grid img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

/* ===== BOTTOM NAVIGATION ===== */
.bottom-nav { 
    position: fixed; 
    bottom: 0; 
    left: 0; /* ဘယ်ဘက်က 0 */
    right: 0; /* ညာဘက်က 0 */
    width: 100%; 
    height: 60px; 
    background: white; 
    display: flex; 
    justify-content: space-around; 
    align-items: center; 
    border-top: 1px solid #eee; 
    z-index: 2000;
    box-sizing: border-box;
    padding: 0 10px;
}

.nav-item { 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center;
    text-decoration: none; 
    color: #666; 
    font-size: 10px;
    flex: 1;
    text-align: center;
}

.nav-item img { 
    width: 22px; 
    height: 22px; 
    margin-bottom: 4px; 
}

.nav-item.active { 
    color: purple; 
    font-weight: bold; 
}

/* ===== VIDEO STYLES ===== */
video {
    width: 100%;
    max-height: 500px;
    background: #000;
    display: block;
}

/* ===== BADGE STYLES ===== */
.badge-official { 
    border-radius: 4px; 
    font-weight: bold; 
    margin-left: 3px; 
    font-size: 12px;
    padding: 2px 8px;
    display: inline-block;
}

.crown-bg { 
    background: linear-gradient(45deg, #a020f0, #ff00ff); 
    color: white; 
    border: 1px solid #fff; 
}

.gold-bg { 
        background: linear-gradient(45deg,#00ff00, #a0f020); 
    color: white; 
    border: 1px solid
         white; }

/* ===== NEWS FEED ===== */
#newsFeed {
    margin-bottom: 80px;
    min-height: 200px;
    width: 100%;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
    padding: 0;
}

/* ===== LOADING STATUS ===== */
.loading-status {
    text-align: center;
    padding: 50px;
    color: gray;
}

/* ===== MEDIA PREVIEW BOX ===== */
#mediaPreviewBox {
    margin-top: 12px;
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    width: 100%;
}

#mediaPreviewBox img,
#mediaPreviewBox video {
    width: 100%;
    border-radius: 8px;
}
/* Media Full Width */
.post-card video,
.post-card img {
    width: 100% !important;
    border-radius: 0 !important;
    display: block;
}

.post-card div[style*="margin-top:10px; background:#000;"] {
    margin-left: -15px !important;
    margin-right: -15px !important;
    width: calc(100% + 30px) !important;
}

.post-card div[style*="display: grid"] {
    margin-left: -15px !important;
    margin-right: -15px !important;
    width: calc(100% + 30px) !important;
}

.photo-grid {
    display: grid;
    gap: 4px;
    margin-top: 10px;
}
.grid-item {
    height: 250px; /* ဒီအမြင့်က အရေးကြီးပါတယ် */
    overflow: hidden;
    background: #eee;
}
.grid-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.grid-1 { grid-template-columns: 1fr; }
.grid-2 { grid-template-columns: 1fr 1fr; }
.grid-3 { grid-template-columns: 2fr 1fr; grid-template-rows: 1fr 1fr; }
.grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

.grid-item { position: relative; cursor: pointer; height: 250px; overflow: hidden; }
.grid-item img { width: 100%; height: 100%; object-fit: cover; }
.grid-3 .grid-item:first-child { grid-row: span 2; }

.more-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6); color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: bold;
}

/* Slide Viewer (Lightbox) */
#photoViewer {
    display: none; position: fixed; z-index: 20000;
    top: 0; left: 0; width: 100%; height: 100%;
    background: black; align-items: center; justify-content: center;
}
.nav-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.2); color: white; border: none;
    padding: 15px; font-size: 20px; cursor: pointer; border-radius: 50%;
}
/* Post ရော Comment ပါ သုံးမယ့် style */
.post-text, .comment-text {
    font-size: 14px;
    line-height: 1.5;
    margin-bottom: 5px;
    white-space: pre-wrap;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 4; /* ၄ ကြောင်းပဲပြမယ် */
    -webkit-box-orient: vertical;
}

.expanded {
    display: block !important;
    -webkit-line-clamp: unset !important;
}

.see-more-btn {
    color: purple;
    font-weight: bold;
    cursor: pointer;
    font-size: 13px;
    display: inline-block;
    margin-bottom: 10px;
}

    <script>
        // --- ၁။ Google Login ---
        async function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                console.log("Google Login Success:", result.user.displayName);
                alert("Login ဝင်ပြီးပါပြီ Senior!");
            } catch (error) {
                alert("Login Error: " + error.message);
            }
        }

        // --- ၂။ Phone Login ---
        function showPhoneLogin() {
            document.getElementById('phoneLoginModal').style.display = 'flex';
            if (!window.recaptchaVerifier) {
                window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'invisible' });
            }
        }
        
        function closePhoneLogin() { 
            document.getElementById('phoneLoginModal').style.display = 'none'; 
        }

        async function sendOTP() {
            const phone = "+959" + document.getElementById('phoneNumber').value.trim();
            try {
                window.confirmationResult = await auth.signInWithPhoneNumber(phone, window.recaptchaVerifier);
                document.getElementById('otpSection').style.display = 'block';
                alert("OTP ပို့ပြီးပါပြီ");
            } catch (error) { 
                alert(error.message); 
            }
        }

        async function verifyOTP() {
            try {
                await window.confirmationResult.confirm(document.getElementById('otpCode').value.trim());
                closePhoneLogin();
                alert("Phone Login ဝင်ပြီးပါပြီ");
            } catch (error) { 
                alert("OTP မှားနေပါတယ်"); 
            }
        }
    </script>

    <!-- Preview Media Functions -->
    <script>
        function previewMedia(input) {
            const box = document.getElementById('mediaPreviewBox');
            const file = input.files[0];
            if (file) {
                box.style.display = 'block';
                const url = URL.createObjectURL(file);
                if (file.type.startsWith('video/')) {
                    box.innerHTML = `<video src="${url}" style="width:100%; border-radius:8px;" controls muted></video>`;
                } else {
                    box.innerHTML = `<img src="${url}" style="width:100%; border-radius:8px;">`;
                }
            }
        }

        function clearPreview() {
            const box = document.getElementById('mediaPreviewBox');
            box.style.display = 'none';
            box.innerHTML = '';
            document.getElementById('mediaInput').value = '';
        }
    </script>

    <script>
    // targetPageId ကို သတ်မှတ်ထားခြင်း
    var targetPageId = "health_posts";

    document.addEventListener('DOMContentLoaded', function() {
        // Firebase Auth အခြေအနေကို စောင့်ကြည့်မယ်
        firebase.auth().onAuthStateChanged(function(user) {
            // ၁။ User Name ပြသခြင်း

            if (userNameElement) {
                userNameElement.innerText = user ? (user.displayName || 'User') : 'Guest';
            }

            // ၂။ Post များကို Load လုပ်ခြင်း
            // loadPosts function ရှိ၊ မရှိ စစ်ပြီးမှ ခေါ်မယ်
            if (typeof loadPosts === 'function') {
                console.log('Loading news feed for: health_posts');
                loadPosts('health_posts'); 
            } else {
                console.error('Error: loadPosts function ကို ရှာမတွေ့ပါ Senior။ script.js ချိတ်ဆက်မှုကို ပြန်စစ်ပါ။');
            }
        });
    });
    
</script>
