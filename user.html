    <script>
// --- ၁။ Google Login ---
async function loginWithGoogle() {
    const provider = new firebase.auth.GoogleAuthProvider();
    try {
        const result = await auth.signInWithPopup(provider);
        console.log("Google Login Success:", result.user.displayName);
    } catch (error) {
        alert("Login Error: " + error.message);
    }
}

// --- ၂။ Phone Login ---
function showPhoneLogin() {
    document.getElementById('phoneLoginModal').style.display = 'flex';
    if (!window.recaptchaVerifier) {
        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'invisible' });
    }
}
function closePhoneLogin() { document.getElementById('phoneLoginModal').style.display = 'none'; }

async function sendOTP() {
    const phone = "+959" + document.getElementById('phoneNumber').value.trim();
    try {
        window.confirmationResult = await auth.signInWithPhoneNumber(phone, window.recaptchaVerifier);
        document.getElementById('otpSection').style.display = 'block';
        alert("OTP ပို့ပြီးပါပြီ");
    } catch (error) { alert(error.message); }
}

async function verifyOTP() {
    try {
        await window.confirmationResult.confirm(document.getElementById('otpCode').value.trim());
        closePhoneLogin();
    } catch (error) { alert("OTP မှားနေပါတယ်"); }
}
</script>
